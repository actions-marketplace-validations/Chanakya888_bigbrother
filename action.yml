name: 'Big-brother'
description: 'Reads your PR description, summarizes it with Claude, and passes context to PR-Agent for smarter code reviews'
author: 'Chanakya888'

branding:
  icon: 'eye'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key'
    required: true

runs:
  using: composite
  steps:
    - name: Summarize PR with Claude
      id: summarize
      shell: bash
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        node ${{ github.action_path }}/dist/index.js
        echo "ANTHROPIC_API_KEY=${{ inputs.anthropic-api-key }}" >> $GITHUB_ENV
        echo "GITHUB_TOKEN=${{ inputs.github-token }}" >> $GITHUB_ENV

    - name: Run PR-Agent with context
      uses: The-PR-Agent/pr-agent@main
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ANTHROPIC.KEY: ${{ inputs.anthropic-api-key }}
        config.model: anthropic/claude-sonnet-4-5
        config.custom_model_max_tokens: "200000"
        config.fallback_models: "[]"
        pr_reviewer.extra_instructions: ${{ steps.summarize.outputs.brief }}
        pr_reviewer.inline_code_comments: "true"
        github_action_config.auto_review: "true"
        github_action_config.auto_improve: "true"
